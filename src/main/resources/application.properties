spring.application.name=product-service
server.port=8082

# Database Configuration (overridden by env vars in K8s)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:productdb}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console (only works when using H2)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
